name: Claude Issue Triage

on:
  issues:
    types: [opened, edited]

jobs:
  triage:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Ensure predefined labels exist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create "bug"             --color "d73a4a" --description "Something isn't working"           || true
          gh label create "enhancement"     --color "a2eeef" --description "New feature or request"           || true
          gh label create "documentation"   --color "0075ca" --description "Improvements or additions to docs" || true
          gh label create "question"        --color "d876e3" --description "Further information is requested"  || true
          gh label create "good first issue" --color "7057ff" --description "Good for newcomers"              || true
          gh label create "priority:high"   --color "e11d48" --description "High priority"                    || true
          gh label create "priority:medium" --color "f97316" --description "Medium priority"                  || true
          gh label create "priority:low"    --color "84cc16" --description "Low priority"                     || true

      - name: Run Claude Issue Triage
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: '--allowedTools "Bash(gh issue view:*),Bash(gh issue edit:*),Bash(gh issue comment:*),Bash(gh label list:*)"'
          prompt: |
            Eres un asistente de triage para un repositorio de un juego Tetris en JavaScript.
            El juego tiene un solo archivo de lógica `game.js` (~300 líneas) y `index.html`.

            Se acaba de ${{ github.event.action == 'opened' && 'crear' || 'editar' }} el issue #${{ github.event.issue.number }}.

            **Título**: ${{ github.event.issue.title }}
            **Cuerpo**:
            ${{ github.event.issue.body }}

            ## Tu tarea

            ### 1. Asignar labels
            Elige UNO O MÁS labels del siguiente conjunto predefinido y aplícalos con el comando:
            `gh issue edit ${{ github.event.issue.number }} --add-label "LABEL" --repo ${{ github.repository }}`

            Labels disponibles (elige SOLO de esta lista):
            - `bug` — algo no funciona correctamente
            - `enhancement` — mejora o nueva funcionalidad solicitada
            - `documentation` — relacionado con documentación
            - `question` — se necesita más información o es una consulta
            - `good first issue` — cambio sencillo, apto para principiantes
            - `priority:high` — bloquea el juego o afecta gravemente la experiencia
            - `priority:medium` — importante pero no bloqueante
            - `priority:low` — mejora menor o cosmética

            ### 2. Publicar diagnóstico
            Publica un comentario en el issue con el siguiente comando:
            `gh issue comment ${{ github.event.issue.number }} --body "DIAGNÓSTICO" --repo ${{ github.repository }}`

            El comentario DEBE estar escrito en **español** y seguir esta estructura:

            ```
            ## 🔍 Diagnóstico Automático

            ### Resumen
            <descripción breve del problema o solicitud>

            ### Área del código afectada
            <qué parte de game.js / index.html está involucrada, con referencias a funciones clave si aplica>

            ### Causa probable
            <análisis de qué podría estar causando el problema o qué se necesita para implementar la mejora>

            ### Enfoque sugerido para la solución
            <pasos de alto nivel para resolverlo, SIN escribir código todavía>

            ### Riesgos y consideraciones
            <efectos secundarios, regresiones o aspectos a tener en cuenta>

            ---
            *Diagnóstico generado automáticamente por Claude. Será usado como base para implementar la solución.*
            ```

            Referencia de arquitectura del juego (para tu análisis):
            - `collide(shape, ox, oy)` — verifica límites y solapamiento
            - `tryRotate()` — rotación con wall kicks
            - `lockPiece()` → `merge()` + `clearLines()` + `spawn()` — cadena de asentamiento
            - `ghostY()` — proyecta la pieza hacia abajo para el ghost
            - `loop(ts)` — bucle requestAnimationFrame
            - `init()` — reset completo
            - Canvas `#board`: 300×600 px (10×20 celdas a 30 px)
            - Fórmula de velocidad: `dropInterval = Math.max(100, 1000 − (level − 1) × 90)` ms
